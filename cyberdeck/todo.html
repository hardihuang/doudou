<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CyberTodo - 任务管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        html, body {
            width: 800px;
            height: 480px;
            overflow: hidden;
            font-family: 'Share Tech Mono', monospace;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3a 50%, #0d0d2d 100%);
            color: #00ffff;
        }
        
        /* 扫描线效果 */
        .scanlines::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 800px;
            height: 480px;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 255, 255, 0.03) 0px,
                transparent 1px,
                transparent 2px,
                rgba(0, 255, 255, 0.03) 3px
            );
            pointer-events: none;
            z-index: 1000;
        }
        
        /* 网格背景 */
        .cyber-grid {
            background-image: 
                linear-gradient(rgba(0, 255, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
        }
        
        /* 霓虹发光 */
        .neon-text {
            text-shadow: 0 0 5px #00ffff, 0 0 10px #00ffff;
        }
        
        .neon-pink {
            text-shadow: 0 0 5px #ff00ff, 0 0 10px #ff00ff;
            color: #ff00ff;
        }
        
        /* 面板 */
        .cyber-panel {
            background: rgba(10, 15, 35, 0.95);
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 4px;
        }
        
        /* 输入框 */
        .cyber-input {
            background: rgba(0, 255, 255, 0.05);
            border: 1px solid rgba(0, 255, 255, 0.3);
            color: #00ffff;
            font-family: 'Share Tech Mono', monospace;
            outline: none;
        }
        
        .cyber-input:focus {
            border-color: #00ffff;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
        }
        
        /* 按钮 */
        .cyber-btn {
            background: linear-gradient(135deg, rgba(0, 255, 255, 0.1), rgba(0, 255, 255, 0.05));
            border: 1px solid rgba(0, 255, 255, 0.4);
            color: #00ffff;
            font-family: 'Orbitron', sans-serif;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .cyber-btn:hover, .cyber-btn:active {
            background: rgba(0, 255, 255, 0.2);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.4);
        }
        
        .cyber-btn-pink {
            border-color: rgba(255, 0, 255, 0.4);
            color: #ff00ff;
            background: linear-gradient(135deg, rgba(255, 0, 255, 0.1), rgba(255, 0, 255, 0.05));
        }
        
        .cyber-btn-pink:hover, .cyber-btn-pink:active {
            background: rgba(255, 0, 255, 0.2);
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.4);
        }
        
        /* 任务项 */
        .task-item {
            background: rgba(0, 255, 255, 0.03);
            border: 1px solid rgba(0, 255, 255, 0.2);
            border-radius: 4px;
            transition: all 0.2s;
        }
        
        .task-item:hover {
            background: rgba(0, 255, 255, 0.08);
            border-color: rgba(0, 255, 255, 0.4);
        }
        
        .task-item.completed {
            opacity: 0.5;
        }
        
        .task-item.completed .task-text {
            text-decoration: line-through;
            color: #666;
        }
        
        /* 复选框 */
        .cyber-checkbox {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(0, 255, 255, 0.5);
            border-radius: 3px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        
        .cyber-checkbox.checked {
            background: #00ff00;
            border-color: #00ff00;
            box-shadow: 0 0 10px #00ff00;
        }
        
        .cyber-checkbox.checked::after {
            content: '✓';
            color: #000;
            font-weight: bold;
            font-size: 14px;
        }
        
        /* 优先级标记 */
        .priority-high {
            border-left: 3px solid #ff0040;
        }
        
        .priority-medium {
            border-left: 3px solid #ffaa00;
        }
        
        .priority-low {
            border-left: 3px solid #00ff00;
        }
        
        /* 滚动条 */
        .cyber-scroll::-webkit-scrollbar {
            width: 6px;
        }
        
        .cyber-scroll::-webkit-scrollbar-track {
            background: rgba(0, 255, 255, 0.05);
        }
        
        .cyber-scroll::-webkit-scrollbar-thumb {
            background: rgba(0, 255, 255, 0.3);
            border-radius: 3px;
        }
        
        /* 动画 */
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        .slide-in {
            animation: slideIn 0.3s ease-out;
        }
        
        @keyframes deleteAnim {
            to {
                opacity: 0;
                transform: translateX(50px);
            }
        }
        
        .deleting {
            animation: deleteAnim 0.3s ease-out forwards;
        }
        
        /* 返回按钮 */
        .back-btn {
            position: absolute;
            top: 15px;
            left: 15px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            z-index: 100;
        }
        
        /* 优先级选择器 */
        .priority-select {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(0, 255, 255, 0.3);
            color: #00ffff;
            font-family: 'Share Tech Mono', monospace;
            outline: none;
            cursor: pointer;
        }
        
        .priority-select:focus {
            border-color: #00ffff;
        }
        
        .priority-select option {
            background: #0a0a1a;
            color: #00ffff;
        }
    </style>
</head>
<body class="scanlines cyber-grid">
    <!-- 返回按钮 -->
    <button class="cyber-btn back-btn" onclick="goBack()">←</button>
    
    <div class="w-full h-full p-4 flex flex-col">
        <!-- 标题 -->
        <div class="text-center mb-4">
            <h1 class="text-3xl font-bold neon-text" style="font-family: 'Orbitron', sans-serif;">
                CYBER<span class="neon-pink">TODO</span>
            </h1>
            <div class="text-sm opacity-70 mt-1">任务管理系统 // TASK MANAGER</div>
        </div>
        
        <!-- 统计栏 -->
        <div class="cyber-panel p-3 mb-4 flex justify-around">
            <div class="text-center">
                <div class="text-2xl font-bold neon-text" id="totalCount">0</div>
                <div class="text-xs opacity-70">总任务</div>
            </div>
            <div class="text-center">
                <div class="text-2xl font-bold" style="color: #00ff00; text-shadow: 0 0 5px #00ff00;" id="completedCount">0</div>
                <div class="text-xs opacity-70">已完成</div>
            </div>
            <div class="text-center">
                <div class="text-2xl font-bold neon-pink" id="pendingCount">0</div>
                <div class="text-xs opacity-70">待完成</div>
            </div>
        </div>
        
        <!-- 输入区 -->
        <div class="flex gap-2 mb-4">
            <input type="text" id="taskInput" class="cyber-input flex-1 px-3 py-2 rounded" 
                   placeholder="输入新任务..." onkeypress="handleKeyPress(event)">
            <select id="prioritySelect" class="priority-select px-2 py-2 rounded">
                <option value="high">高</option>
                <option value="medium" selected>中</option>
                <option value="low">低</option>
            </select>
            <button class="cyber-btn px-4 py-2 rounded font-bold" onclick="addTask()">+</button>
        </div>
        
        <!-- 筛选按钮 -->
        <div class="flex gap-2 mb-3">
            <button class="cyber-btn flex-1 py-2 rounded text-sm" id="filterAll" onclick="setFilter('all')">全部</button>
            <button class="cyber-btn flex-1 py-2 rounded text-sm opacity-50" id="filterActive" onclick="setFilter('active')">待办</button>
            <button class="cyber-btn flex-1 py-2 rounded text-sm opacity-50" id="filterCompleted" onclick="setFilter('completed')">已完成</button>
            <button class="cyber-btn-pink px-4 py-2 rounded text-sm" onclick="clearCompleted()">清除</button>
        </div>
        
        <!-- 任务列表 -->
        <div class="flex-1 cyber-panel p-3 overflow-hidden">
            <div id="taskList" class="cyber-scroll h-full overflow-y-auto space-y-2">
                <!-- 任务项将在这里动态生成 -->
            </div>
            <div id="emptyState" class="h-full flex items-center justify-center opacity-50">
                <div class="text-center">
                    <div class="text-4xl mb-2">📋</div>
                    <div>暂无任务</div>
                    <div class="text-sm opacity-70">添加一个新任务开始吧</div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // 任务数据
        let tasks = JSON.parse(localStorage.getItem('cyberTasks')) || [];
        let currentFilter = 'all';
        
        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            renderTasks();
            updateStats();
        });
        
        // 返回主页
        function goBack() {
            window.location.href = 'index.html';
        }
        
        // 添加任务
        function addTask() {
            const input = document.getElementById('taskInput');
            const prioritySelect = document.getElementById('prioritySelect');
            const text = input.value.trim();
            
            if (!text) return;
            
            const task = {
                id: Date.now(),
                text: text,
                priority: prioritySelect.value,
                completed: false,
                createdAt: new Date().toISOString()
            };
            
            tasks.unshift(task);
            saveTasks();
            renderTasks();
            updateStats();
            
            input.value = '';
            input.focus();
        }
        
        // 处理回车键
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                addTask();
            }
        }
        
        // 切换完成状态
        function toggleTask(id) {
            const task = tasks.find(t => t.id === id);
            if (task) {
                task.completed = !task.completed;
                saveTasks();
                renderTasks();
                updateStats();
            }
        }
        
        // 删除任务
        function deleteTask(id) {
            const element = document.getElementById(`task-${id}`);
            if (element) {
                element.classList.add('deleting');
                setTimeout(() => {
                    tasks = tasks.filter(t => t.id !== id);
                    saveTasks();
                    renderTasks();
                    updateStats();
                }, 300);
            }
        }
        
        // 清除已完成
        function clearCompleted() {
            tasks = tasks.filter(t => !t.completed);
            saveTasks();
            renderTasks();
            updateStats();
        }
        
        // 设置筛选
        function setFilter(filter) {
            currentFilter = filter;
            
            // 更新按钮样式
            ['All', 'Active', 'Completed'].forEach(f => {
                const btn = document.getElementById(`filter${f}`);
                if (f.toLowerCase() === filter) {
                    btn.classList.remove('opacity-50');
                } else {
                    btn.classList.add('opacity-50');
                }
            });
            
            renderTasks();
        }
        
        // 渲染任务列表
        function renderTasks() {
            const list = document.getElementById('taskList');
            const emptyState = document.getElementById('emptyState');
            
            let filteredTasks = tasks;
            if (currentFilter === 'active') {
                filteredTasks = tasks.filter(t => !t.completed);
            } else if (currentFilter === 'completed') {
                filteredTasks = tasks.filter(t => t.completed);
            }
            
            if (filteredTasks.length === 0) {
                list.innerHTML = '';
                emptyState.style.display = 'flex';
                return;
            }
            
            emptyState.style.display = 'none';
            
            list.innerHTML = filteredTasks.map(task => `
                <div id="task-${task.id}" class="task-item priority-${task.priority} p-3 flex items-center gap-3 slide-in ${task.completed ? 'completed' : ''}">
                    <div class="cyber-checkbox ${task.completed ? 'checked' : ''}" onclick="toggleTask(${task.id})"></div>
                    <div class="flex-1 task-text text-sm">${escapeHtml(task.text)}</div>
                    <div class="text-xs opacity-50">${getPriorityLabel(task.priority)}</div>
                    <button class="cyber-btn-pink w-6 h-6 rounded flex items-center justify-center text-xs" 
                            onclick="deleteTask(${task.id})">×</button>
                </div>
            `).join('');
        }
        
        // 更新统计
        function updateStats() {
            const total = tasks.length;
            const completed = tasks.filter(t => t.completed).length;
            const pending = total - completed;
            
            document.getElementById('totalCount').textContent = total;
            document.getElementById('completedCount').textContent = completed;
            document.getElementById('pendingCount').textContent = pending;
        }
        
        // 保存到本地存储
        function saveTasks() {
            localStorage.setItem('cyberTasks', JSON.stringify(tasks));
        }
        
        // 获取优先级标签
        function getPriorityLabel(priority) {
            const labels = {
                high: '高',
                medium: '中',
                low: '低'
            };
            return labels[priority] || priority;
        }
        
        // HTML转义
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
