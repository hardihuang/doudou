<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>森林跑酷 // MG豆豆</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --cyan: #00ffff;
            --pink: #ff00ff;
            --green: #00ff41;
            --yellow: #ffff00;
        }

        body {
            font-family: 'Share Tech Mono', monospace;
            background: #0a0a0f;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: repeating-linear-gradient(0deg, rgba(0, 255, 255, 0.02) 0px, transparent 1px, transparent 2px, rgba(0, 255, 255, 0.02) 3px);
            pointer-events: none;
            z-index: 10;
        }

        #gameContainer {
            position: relative;
            box-shadow: 0 0 50px rgba(0, 255, 255, 0.3);
            border: 2px solid var(--cyan);
            border-radius: 10px;
            overflow: hidden;
        }

        canvas {
            display: block;
            background: linear-gradient(180deg, #1a3a1a 0%, #0d1f0d 50%, #051005 100%);
        }

        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            color: var(--cyan);
            font-size: 18px;
            font-weight: bold;
            text-shadow: 0 0 10px var(--cyan);
            z-index: 5;
        }

        #startScreen, #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #fff;
            background: rgba(0, 0, 0, 0.9);
            padding: 40px;
            border-radius: 20px;
            border: 3px solid var(--pink);
            box-shadow: 0 0 30px rgba(255, 0, 255, 0.5);
            z-index: 20;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 36px;
            color: var(--cyan);
            text-shadow: 0 0 20px var(--cyan);
            margin-bottom: 20px;
        }

        p {
            color: var(--text-secondary);
            margin: 10px 0;
            font-size: 14px;
        }

        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 15px 40px;
            background: linear-gradient(135deg, rgba(0, 255, 255, 0.2), rgba(255, 0, 255, 0.2));
            border: 2px solid var(--cyan);
            color: var(--cyan);
            font-family: 'Orbitron', sans-serif;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
        }

        .btn:hover {
            background: rgba(0, 255, 255, 0.3);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
            transform: scale(1.05);
        }

        .controls {
            margin-top: 20px;
            font-size: 12px;
            color: var(--green);
        }

        .skill-indicator {
            position: absolute;
            bottom: 10px;
            left: 10px;
            color: var(--yellow);
            font-size: 14px;
            text-shadow: 0 0 10px var(--yellow);
            z-index: 5;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="400"></canvas>
        
        <div id="ui">
            <div>分数: <span id="score">0</span></div>
            <div>距离: <span id="distance">0</span>m</div>
        </div>

        <div class="skill-indicator">
            二段跳: <span id="jumpCount">2</span>/2
        </div>

        <div id="startScreen">
            <h1>森林跑酷</h1>
            <p>在神秘森林中奔跑，躲避尖刺</p>
            <p>使用二段跳越过障碍</p>
            <div class="controls">
                [空格键] 或 [↑] 跳跃<br>
                [二段跳] 空中再次跳跃
            </div>
            <div class="btn" onclick="startGame()">开始游戏</div>
        </div>

        <div id="gameOver" style="display: none;">
            <h1 style="color: var(--pink);">游戏结束</h1>
            <p>最终分数: <span id="finalScore">0</span></p>
            <p>奔跑距离: <span id="finalDistance">0</span>m</p>
            <div class="btn" onclick="restartGame()">重新开始</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let gameRunning = false;
        let score = 0;
        let distance = 0;
        let gameSpeed = 3;
        let jumpCount = 2;
        
        // 玩家
        const player = {
            x: 100,
            y: 300,
            width: 30,
            height: 30,
            velocityY: 0,
            jumping: false,
            grounded: false,
            color: '#00ffff'
        };
        
        // 地面
        const ground = {
            y: 330,
            height: 70
        };
        
        // 障碍物数组
        let obstacles = [];
        let particles = [];
        let trees = [];
        
        // 初始化树木背景
        function initTrees() {
            trees = [];
            for (let i = 0; i < 10; i++) {
                trees.push({
                    x: Math.random() * canvas.width,
                    y: ground.y - 50 - Math.random() * 100,
                    width: 30 + Math.random() * 40,
                    height: 60 + Math.random() * 80,
                    speed: 0.5 + Math.random() * 0.5
                });
            }
        }
        
        // 绘制树木
        function drawTrees() {
            trees.forEach(tree => {
                // 树干
                ctx.fillStyle = '#3d2817';
                ctx.fillRect(tree.x + tree.width/3, tree.y + tree.height/2, tree.width/3, tree.height/2);
                
                // 树冠
                ctx.fillStyle = '#1a4a1a';
                ctx.beginPath();
                ctx.moveTo(tree.x, tree.y + tree.height/2);
                ctx.lineTo(tree.x + tree.width/2, tree.y);
                ctx.lineTo(tree.x + tree.width, tree.y + tree.height/2);
                ctx.closePath();
                ctx.fill();
                
                // 移动树木
                tree.x -= tree.speed;
                if (tree.x + tree.width < 0) {
                    tree.x = canvas.width + Math.random() * 200;
                }
            });
        }
        
        // 绘制玩家
        function drawPlayer() {
            // 发光效果
            ctx.shadowBlur = 20;
            ctx.shadowColor = player.color;
            
            // 身体
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x, player.y, player.width, player.height);
            
            // 眼睛
            ctx.shadowBlur = 0;
            ctx.fillStyle = '#000';
            ctx.fillRect(player.x + 20, player.y + 8, 6, 6);
            
            // 跳跃指示器
            if (jumpCount > 0) {
                ctx.fillStyle = jumpCount === 2 ? '#00ff41' : '#ffff00';
                ctx.fillRect(player.x, player.y - 10, player.width * (jumpCount / 2), 4);
            }
        }
        
        // 绘制地面
        function drawGround() {
            // 草地
            ctx.fillStyle = '#0d3d0d';
            ctx.fillRect(0,            ground.y, canvas.width, ground.height);
            
            // 草地纹理
            ctx.fillStyle = '#1a5a1a';
            for (let i = 0; i < canvas.width; i += 20) {
                ctx.fillRect(i, ground.y, 10, 5);
            }
            
            // 尖刺装饰
            ctx.fillStyle = '#4a4a4a';
            for (let i = 0; i < canvas.width; i += 100) {
                ctx.beginPath();
                ctx.moveTo(i, ground.y);
                ctx.lineTo(i + 10, ground.y - 15);
                ctx.lineTo(i + 20, ground.y);
                ctx.closePath();
                ctx.fill();
            }
        }
        
        // 生成障碍物
        function spawnObstacle() {
            if (Math.random() < 0.02) {
                const type = Math.random() < 0.5 ? 'spike' : 'rock';
                obstacles.push({
                    x: canvas.width,
                    y: type === 'spike' ? ground.y - 30 : ground.y - 40,
                    width: type === 'spike' ? 30 : 40,
                    height: type === 'spike' ? 30 : 40,
                    type: type
                });
            }
        }
        
        // 绘制障碍物
        function drawObstacles() {
            obstacles.forEach((obs, index) => {
                if (obs.type === 'spike') {
                    // 尖刺
                    ctx.fillStyle = '#ff0066';
                    ctx.beginPath();
                    ctx.moveTo(obs.x, obs.y + obs.height);
                    ctx.lineTo(obs.x + obs.width/2, obs.y);
                    ctx.lineTo(obs.x + obs.width, obs.y + obs.height);
                    ctx.closePath();
                    ctx.fill();
                    
                    // 发光效果
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = '#ff0066';
                    ctx.strokeStyle = '#ff0066';
                    ctx.stroke();
                    ctx.shadowBlur = 0;
                } else {
                    // 岩石
                    ctx.fillStyle = '#666';
                    ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
                    ctx.fillStyle = '#888';
                    ctx.fillRect(obs.x + 5, obs.y + 5, obs.width - 10, obs.height - 10);
                }
                
                // 移动障碍物
                obs.x -= gameSpeed;
                
                // 移除屏幕外的障碍物
                if (obs.x + obs.width < 0) {
                    obstacles.splice(index, 1);
                    score += 10;
                    document.getElementById('score').textContent = score;
                }
            });
        }
        
        // 碰撞检测
        function checkCollision() {
            obstacles.forEach(obs => {
                if (player.x < obs.x + obs.width &&
                    player.x + player.width > obs.x &&
                    player.y < obs.y + obs.height &&
                    player.y + player.height > obs.y) {
                    gameOver();
                }
            });
        }
        
        // 物理更新
        function updatePhysics() {
            // 重力
            player.velocityY += 0.6;
            player.y += player.velocityY;
            
            // 地面碰撞
            if (player.y + player.height >= ground.y) {
                player.y = ground.y - player.height;
                player.velocityY = 0;
                player.grounded = true;
                player.jumping = false;
                jumpCount = 2;
                document.querySelector('.skill-indicator').innerHTML = '二段跳: <span id="jumpCount">2</span>/2';
            } else {
                player.grounded = false;
            }
        }
        
        // 跳跃
        function jump() {
            if (jumpCount > 0) {
                player.velocityY = -12;
                player.jumping = true;
                jumpCount--;
                document.querySelector('.skill-indicator').innerHTML = `二段跳: <span id="jumpCount">${jumpCount}</span>/2`;
                
                // 创建跳跃粒子
                for (let i = 0; i < 5; i++) {
                    particles.push({
                        x: player.x + player.width/2,
                        y: player.y + player.height,
                        vx: (Math.random() - 0.5) * 4,
                        vy: Math.random() * 2,
                        life: 20,
                        color: jumpCount === 1 ? '#ffff00' : '#00ff41'
                    });
                }
            }
        }
        
        // 绘制粒子
        function drawParticles() {
            particles.forEach((p, index) => {
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life / 20;
                ctx.fillRect(p.x, p.y, 4, 4);
                ctx.globalAlpha = 1;
                
                p.x += p.vx;
                p.y += p.vy;
                p.life--;
                
                if (p.life <= 0) {
                    particles.splice(index, 1);
                }
            });
        }
        
        // 游戏循环
        function gameLoop() {
            if (!gameRunning) return;
            
            // 清空画布
            ctx.fillStyle = 'rgba(10, 20, 10, 0.3)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 绘制背景
            drawTrees();
            drawGround();
            
            // 更新和绘制
            updatePhysics();
            spawnObstacle();
            drawObstacles();
            drawPlayer();
            drawParticles();
            checkCollision();
            
            // 更新距离
            distance += gameSpeed / 10;
            document.getElementById('distance').textContent = Math.floor(distance);
            
            // 逐渐增加速度
            if (distance % 100 === 0) {
                gameSpeed += 0.1;
            }
            
            requestAnimationFrame(gameLoop);
        }
        
        // 开始游戏
        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            gameRunning = true;
            score = 0;
            distance = 0;
            gameSpeed = 3;
            jumpCount = 2;
            obstacles = [];
            particles = [];
            player.y = ground.y - player.height;
            player.velocityY = 0;
            initTrees();
            gameLoop();
        }
        
        // 游戏结束
        function gameOver() {
            gameRunning = false;
            document.getElementById('finalScore').textContent = score;
            document.getElementById('finalDistance').textContent = Math.floor(distance);
            document.getElementById('gameOver').style.display = 'block';
        }
        
        // 重新开始
        function restartGame() {
            document.getElementById('gameOver').style.display = 'none';
            startGame();
        }
        
        // 键盘控制
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' || e.code === 'ArrowUp') {
                e.preventDefault();
                jump();
            }
        });
        
        // 触摸控制
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            jump();
        });
        
        // 初始化
        initTrees();
    </script>
</body>
</html>
