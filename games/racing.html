<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>赛车闯关 - CyberDeck Games</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: none;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #1a1a2e;
            color: #fff;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        
        #gameContainer {
            position: relative;
            width: 800px;
            height: 480px;
            background: #0f0f1a;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.3);
        }
        
        #gameCanvas {
            display: block;
            background: #16213e;
        }
        
        #ui {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(180deg, rgba(0,0,0,0.8) 0%, transparent 100%);
            pointer-events: none;
        }
        
        .ui-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            font-weight: 600;
        }
        
        .ui-label {
            color: #888;
            font-size: 12px;
        }
        
        .ui-value {
            color: #00d4ff;
            font-size: 18px;
            font-family: 'Courier New', monospace;
        }
        
        #controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
            opacity: 0.7;
        }
        
        .control-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(0, 212, 255, 0.5);
            color: #00d4ff;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            transition: all 0.1s;
        }
        
        .control-btn:active {
            background: rgba(0, 212, 255, 0.3);
            transform: scale(0.95);
        }
        
        #startScreen, #gameOverScreen, #levelCompleteScreen {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        
        .screen-title {
            font-size: 48px;
            font-weight: 700;
            color: #00d4ff;
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
            margin-bottom: 20px;
        }
        
        .screen-subtitle {
            font-size: 18px;
            color: #888;
            margin-bottom: 40px;
            text-align: center;
            line-height: 1.6;
        }
        
        .btn {
            padding: 15px 40px;
            font-size: 18px;
            font-weight: 600;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
            color: #fff;
            box-shadow: 0 4px 15px rgba(0, 212, 255, 0.4);
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 212, 255, 0.6);
        }
        
        .btn-secondary {
            background: transparent;
            color: #00d4ff;
            border: 2px solid #00d4ff;
            margin-top: 15px;
        }
        
        .btn-secondary:hover {
            background: rgba(0, 212, 255, 0.1);
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-box {
            background: rgba(255,255,255,0.05);
            padding: 15px 25px;
            border-radius: 10px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: #00d4ff;
        }
        
        .stat-label {
            font-size: 12px;
            color: #888;
            margin-top: 5px;
        }
        
        .hidden {
            display: none !important;
        }
        
        #levelIndicator {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 72px;
            font-weight: 700;
            color: #00d4ff;
            text-shadow: 0 0 30px rgba(0, 212, 255, 0.8);
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        
        #levelIndicator.show {
            opacity: 1;
        }
        
        /* 响应式 */
        @media (max-width: 820px) {
            #gameContainer {
                width: 100vw;
                height: 100vh;
                border-radius: 0;
            }
            
            .screen-title {
                font-size: 36px;
            }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="480"></canvas>
        
        <div id="ui">
            <div class="ui-item">
                <span class="ui-label">关卡</span>
                <span class="ui-value" id="levelDisplay">1</span>
            </div>
            <div class="ui-item">
                <span class="ui-label">时间</span>
                <span class="ui-value" id="timeDisplay">00:00</span>
            </div>
            <div class="ui-item">
                <span class="ui-label">速度</span>
                <span class="ui-value" id="speedDisplay">0</span>
            </div>
            <div class="ui-item">
                <span class="ui-label">生命</span>
                <span class="ui-value" id="livesDisplay">♥♥♥</span>
            </div>
        </div>
        
        <div id="controls">
            <div class="control-btn" id="btnLeft">←</div>
            <div class="control-btn" id="btnRight">→</div>
        </div>
        
        <div id="levelIndicator">LEVEL 1</div>
        
        <!-- 开始界面 -->
        <div id="startScreen">
            <h1 class="screen-title">🏎️ 赛车闯关</h1>
            <p class="screen-subtitle">
                驾驶赛车穿越障碍，挑战极限速度！<br>
                使用 ← → 方向键或触摸按钮控制<br>
                避开障碍物，收集加速道具
            </p>
            <button class="btn btn-primary" onclick="startGame()">开始游戏</button>
        </div>
        
        <!-- 游戏结束界面 -->
        <div id="gameOverScreen" class="hidden">
            <h1 class="screen-title">💥 游戏结束</h1>
            <div class="stats-grid">
                <div class="stat-box">
                    <div class="stat-value" id="finalLevel">1</div>
                    <div class="stat-label">到达关卡</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="finalTime">00:00</div>
                    <div class="stat-label">总用时</div>
                </div>
            </div>
            <button class="btn btn-primary" onclick="restartGame()">重新开始</button>
            <button class="btn btn-secondary" onclick="backToMenu()">返回菜单</button>
        </div>
        
        <!-- 关卡完成界面 -->
        <div id="levelCompleteScreen" class="hidden">
            <h1 class="screen-title">✨ 关卡完成</h1>
            <p class="screen-subtitle" id="levelCompleteText">准备进入下一关...</p>
            <button class="btn btn-primary" onclick="nextLevel()">下一关</button>
        </div>
    </div>

    <script>
        // 游戏配置
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // 游戏状态
        let gameState = 'menu'; // menu, playing, paused, gameover, levelComplete
        let currentLevel = 1;
        let maxLevels = 5;
        let score = 0;
        let lives = 3;
        let startTime = 0;
        let gameTime = 0;
        
        // 赛车
        const car = {
            x: 400,
            y: 400,
            width: 40,
            height: 60,
            speed: 0,
            maxSpeed: 8,
            acceleration: 0.2,
            friction: 0.95,
            angle: 0,
            color: '#00d4ff'
        };
        
        // 赛道
        const track = {
            width: 600,
            leftBorder: 100,
            rightBorder: 700,
            segments: []
        };
        
        // 障碍物
        let obstacles = [];
        let powerUps = [];
        let particles = [];
        
        // 输入控制
        const keys = {
            left: false,
            right: false,
            up: false,
            down: false
        };
        
        // 初始化
        function init() {
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
            
            // 键盘控制
            window.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowLeft' || e.key === 'a') keys.left = true;
                if (e.key === 'ArrowRight' || e.key === 'd') keys.right = true;
                if (e.key === 'ArrowUp' || e.key === 'w') keys.up = true;
                if (e.key === 'ArrowDown' || e.key === 's') keys.down = true;
            });
            
            window.addEventListener('keyup', (e) => {
                if (e.key === 'ArrowLeft' || e.key === 'a') keys.left = false;
                if (e.key === 'ArrowRight' || e.key === 'd') keys.right = false;
                if (e.key === 'ArrowUp' || e.key === 'w') keys.up = false;
                if (e.key === 'ArrowDown' || e.key === 's') keys.down = false;
            });
            
            // 触摸控制
            const btnLeft = document.getElementById('btnLeft');
            const btnRight = document.getElementById('btnRight');
            
            btnLeft.addEventListener('touchstart', (e) => { e.preventDefault(); keys.left = true; });
            btnLeft.addEventListener('touchend', (e) => { e.preventDefault(); keys.left = false; });
            btnLeft.addEventListener('mousedown', () => keys.left = true);
            btnLeft.addEventListener('mouseup', () => keys.left = false);
            
            btnRight.addEventListener('touchstart', (e) => { e.preventDefault(); keys.right = true; });
            btnRight.addEventListener('touchend', (e) => { e.preventDefault(); keys.right = false; });
            btnRight.addEventListener('mousedown', () => keys.right = true);
            btnRight.addEventListener('mouseup', () => keys.right = false);
            
            // 开始游戏循环
            requestAnimationFrame(gameLoop);
        }
        
        function resizeCanvas() {
            const container = document.getElementById('gameContainer');
            const aspect = 800 / 480;
            let width = container.clientWidth;
            let height = container.clientHeight;
            
            if (width / height > aspect) {
                width = height * aspect;
            } else {
                height = width / aspect;
            }
            
            canvas.style.width = width + 'px';
            canvas.style.height = height + 'px';
        }
        
        // 生成关卡
        function generateLevel(level) {
            obstacles = [];
            powerUps = [];
            
            const obstacleCount = 5 + level * 3;
            const speedMultiplier = 1 + level * 0.2;
            
            for (let i = 0; i < obstacleCount; i++) {
                obstacles.push({
                    x: track.leftBorder + 50 + Math.random() * (track.width - 100),
                    y: -100 - i * 150,
                    width: 40 + Math.random() * 30,
                    height: 40 + Math.random() * 20,
                    speed: (2 + Math.random() * 2) * speedMultiplier,
                    color: '#ff4444',
                    type: 'obstacle'
                });
            }
            
            // 添加道具
            for (let i = 0; i < 3; i++) {
                powerUps.push({
                    x: track.leftBorder + 50 + Math.random() * (track.width - 100),
                    y: -200 - i * 300,
                    width: 30,
                    height: 30,
                    speed: 3 * speedMultiplier,
                    type: Math.random() > 0.5 ? 'speed' : 'life',
                    active: true
                });
            }
        }
        
        // 开始游戏
        function startGame() {
            document.getElementById('startScreen').classList.add('hidden');
            gameState = 'playing';
            currentLevel = 1;
            score = 0;
            lives = 3;
            startTime = Date.now();
            
            resetCar();
            generateLevel(currentLevel);
            showLevelIndicator();
        }
        
        function resetCar() {
            car.x = 400;
            car.y = 400;
            car.speed = 0;
            car.angle = 0;
        }
        
        function showLevelIndicator() {
            const indicator = document.getElementById('levelIndicator');
            indicator.textContent = 'LEVEL ' + currentLevel;
            indicator.classList.add('show');
            setTimeout(() => indicator.classList.remove('show'), 2000);
        }
        
        // 游戏主循环
        function gameLoop() {
            if (gameState === 'playing') {
                update();
                render();
            }
            requestAnimationFrame(gameLoop);
        }
        
        // 更新游戏逻辑
        function update() {
            // 更新赛车
            if (keys.left) car.x -= 5;
            if (keys.right) car.x += 5;
            if (keys.up) car.speed = Math.min(car.speed + car.acceleration, car.maxSpeed);
            if (keys.down) car.speed = Math.max(car.speed - car.acceleration, -car.maxSpeed / 2);
            
            car.speed *= car.friction;
            car.y -= car.speed;
            
            // 边界检测
            if (car.x < track.leftBorder + car.width / 2) {
                car.x = track.leftBorder + car.width / 2;
                car.speed *= 0.5;
            }
            if (car.x > track.rightBorder - car.width / 2) {
                car.x = track.rightBorder - car.width / 2;
                car.speed *= 0.5;
            }
            
            // 更新障碍物
            obstacles.forEach((obs, index) => {
                obs.y += obs.speed;
                
                // 碰撞检测
                if (checkCollision(car, obs)) {
                    lives--;
                    createExplosion(car.x,
 car.y);
                    obstacles.splice(index, 1);
                    
                    if (lives <= 0) {
                        gameOver();
                    }
                }
                
                // 移除屏幕外的障碍物
                if (obs.y > 500) {
                    obstacles.splice(index, 1);
                    score += 10;
                }
            });
            
            // 更新道具
            powerUps.forEach((item, index) => {
                if (!item.active) return;
                
                item.y += item.speed;
                
                if (checkCollision(car, item)) {
                    if (item.type === 'speed') {
                        car.maxSpeed += 2;
                        setTimeout(() => car.maxSpeed -= 2, 5000);
                    } else if (item.type === 'life') {
                        lives = Math.min(lives + 1, 5);
                    }
                    item.active = false;
                }
                
                if (item.y > 500) item.active = false;
            });
            
            // 生成新障碍物
            if (Math.random() < 0.02 + currentLevel * 0.005) {
                obstacles.push({
                    x: track.leftBorder + 50 + Math.random() * (track.width - 100),
                    y: -50,
                    width: 40 + Math.random() * 30,
                    height: 40 + Math.random() * 20,
                    speed: (2 + Math.random() * 2) * (1 + currentLevel * 0.2),
                    color: '#ff4444',
                    type: 'obstacle'
                });
            }
            
            // 更新粒子
            particles = particles.filter(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.02;
                return p.life > 0;
            });
            
            // 更新UI
            gameTime = Date.now() - startTime;
            updateUI();
            
            // 检查关卡完成
            if (score >= currentLevel * 100) {
                levelComplete();
            }
        }
        
        // 碰撞检测
        function checkCollision(a, b) {
            return a.x - a.width/2 < b.x + b.width/2 &&
                   a.x + a.width/2 > b.x - b.width/2 &&
                   a.y - a.height/2 < b.y + b.height/2 &&
                   a.y + a.height/2 > b.y - b.height/2;
        }
        
        // 创建爆炸效果
        function createExplosion(x, y) {
            for (let i = 0; i < 20; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 10,
                    vy: (Math.random() - 0.5) * 10,
                    life: 1,
                    color: `hsl(${Math.random() * 60}, 100%, 50%)`
                });
            }
        }
        
        // 渲染游戏
        function render() {
            // 清空画布
            ctx.fillStyle = '#16213e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 绘制赛道
            ctx.fillStyle = '#0f0f1a';
            ctx.fillRect(track.leftBorder, 0, track.width, canvas.height);
            
            // 绘制赛道边界
            ctx.strokeStyle = '#00d4ff';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(track.leftBorder, 0);
            ctx.lineTo(track.leftBorder, canvas.height);
            ctx.moveTo(track.rightBorder, 0);
            ctx.lineTo(track.rightBorder, canvas.height);
            ctx.stroke();
            
            // 绘制赛道中线
            ctx.strokeStyle = 'rgba(255,255,255,0.1)';
            ctx.lineWidth = 2;
            ctx.setLineDash([20, 20]);
            ctx.beginPath();
            ctx.moveTo(400, 0);
            ctx.lineTo(400, canvas.height);
            ctx.stroke();
            ctx.setLineDash([]);
            
            // 绘制网格
            ctx.strokeStyle = 'rgba(0,212,255,0.05)';
            ctx.lineWidth = 1;
            for (let i = 0; i < canvas.width; i += 50) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i, canvas.height);
                ctx.stroke();
            }
            for (let i = 0; i < canvas.height; i += 50) {
                ctx.beginPath();
                ctx.moveTo(0, i);
                ctx.lineTo(canvas.width, i);
                ctx.stroke();
            }
            
            // 绘制道具
            powerUps.forEach(item => {
                if (!item.active) return;
                ctx.save();
                ctx.translate(item.x, item.y);
                
                if (item.type === 'speed') {
                    ctx.fillStyle = '#00ff88';
                    ctx.beginPath();
                    ctx.moveTo(0, -15);
                    ctx.lineTo(10, 5);
                    ctx.lineTo(0, 0);
                    ctx.lineTo(-10, 5);
                    ctx.closePath();
                    ctx.fill();
                } else {
                    ctx.fillStyle = '#ff00ff';
                    ctx.beginPath();
                    ctx.arc(0, 0, 12, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#fff';
                    ctx.font = '16px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText('♥', 0, 5);
                }
                
                ctx.restore();
            });
            
            // 绘制障碍物
            obstacles.forEach(obs => {
                ctx.save();
                ctx.translate(obs.x, obs.y);
                
                // 障碍物主体
                ctx.fillStyle = obs.color;
                ctx.shadowColor = obs.color;
                ctx.shadowBlur = 10;
                ctx.fillRect(-obs.width/2, -obs.height/2, obs.width, obs.height);
                
                // 障碍物细节
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.strokeRect(-obs.width/2 + 3, -obs.height/2 + 3, obs.width - 6, obs.height - 6);
                
                ctx.restore();
            });
            
            // 绘制赛车
            ctx.save();
            ctx.translate(car.x, car.y);
            
            // 赛车阴影
            ctx.fillStyle = 'rgba(0,0,0,0.3)';
            ctx.beginPath();
            ctx.ellipse(5, 35, 15, 25, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // 赛车主体
            ctx.fillStyle = car.color;
            ctx.shadowColor = car.color;
            ctx.shadowBlur = 20;
            ctx.beginPath();
            ctx.moveTo(0, -30);
            ctx.lineTo(15, 10);
            ctx.lineTo(15, 25);
            ctx.lineTo(-15, 25);
            ctx.lineTo(-15, 10);
            ctx.closePath();
            ctx.fill();
            
            // 赛车细节
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.moveTo(0, -20);
            ctx.lineTo(5, -5);
            ctx.lineTo(-5, -5);
            ctx.closePath();
            ctx.fill();
            
            // 尾焰
            if (car.speed > 2) {
                ctx.fillStyle = `rgba(0, 212, 255, ${Math.random() * 0.5 + 0.5})`;
                ctx.beginPath();
                ctx.moveTo(-8, 25);
                ctx.lineTo(0, 25 + Math.random() * 20);
                ctx.lineTo(8, 25);
                ctx.closePath();
                ctx.fill();
            }
            
            ctx.restore();
            
            // 绘制粒子
            particles.forEach(p => {
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1;
        }
        
        // 更新UI
        function updateUI() {
            document
            document.getElementById('levelDisplay').textContent = currentLevel;
            document.getElementById('timeDisplay').textContent = formatTime(gameTime);
            document.getElementById('speedDisplay').textContent = Math.abs(Math.round(car.speed * 10));
            document.getElementById('livesDisplay').textContent = '♥'.repeat(lives);
        }
        
        // 格式化时间
        function formatTime(ms) {
            const seconds = Math.floor(ms / 1000);
            const minutes = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${minutes.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }
        
        // 关卡完成
        function levelComplete() {
            gameState = 'levelComplete';
            if (currentLevel >= maxLevels) {
                document.getElementById('levelCompleteText').textContent = '恭喜！你已通关所有关卡！';
            } else {
                document.getElementById('levelCompleteText').textContent = `第${currentLevel}关完成！准备进入第${currentLevel + 1}关...`;
            }
            document.getElementById('levelCompleteScreen').classList.remove('hidden');
        }
        
        // 下一关
        function nextLevel() {
            document.getElementById('levelCompleteScreen').classList.add('hidden');
            
            if (currentLevel >= maxLevels) {
                gameOver(true);
                return;
            }
            
            currentLevel++;
            resetCar();
            generateLevel(currentLevel);
            gameState = 'playing';
            showLevelIndicator();
        }
        
        // 游戏结束
        function gameOver(win = false) {
            gameState = 'gameover';
            document.getElementById('gameOverScreen').classList.remove('hidden');
            document.getElementById('finalLevel').textContent = currentLevel;
            document.getElementById('finalTime').textContent = formatTime(gameTime);
            
            if (win) {
                document.querySelector('#gameOverScreen .screen-title').textContent = '🏆 通关成功！';
            } else {
                document.querySelector('#gameOverScreen .screen-title').textContent = '💥 游戏结束';
            }
        }
        
        // 重新开始
        function restartGame() {
            document.getElementById('gameOverScreen').classList.add('hidden');
            startGame();
        }
        
        // 返回菜单
        function backToMenu() {
            document.getElementById('gameOverScreen').classList.add('hidden');
            document.getElementById('startScreen').classList.remove('hidden');
            gameState = 'menu';
        }
        
        // 初始化
        init();
